name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: build.cmd

      - name: Create release with exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release create "$GITHUB_REF_NAME" DiscordMicMonitor.exe --title "$GITHUB_REF_NAME" --generate-notes
